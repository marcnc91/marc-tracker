<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="data:application/json,{%22name%22:%22Marc%20Tracker%22,%22short_name%22:%22Tracker%22,%22start_url%22:%22/tracker.html%22,%22display%22:%22standalone%22,%22background_color%22:%22%230a0a0f%22,%22theme_color%22:%22%230a0a0f%22}">
<title>Marc Tracker</title>
<style>
:root {
  --bg: #0a0a0f;
  --bg2: #13131a;
  --bg3: #1c1c28;
  --bg4: #252535;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --green: #00b894;
  --green2: #55efc4;
  --orange: #f39c12;
  --red: #e74c3c;
  --text: #f0f0f5;
  --text2: #9090a8;
  --text3: #606078;
  --radius: 14px;
  --radius-sm: 8px;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
  padding-bottom: 80px;
  overscroll-behavior: none;
}

.header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 12px 16px 0;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.header h1 {
  font-size: 22px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent2), var(--green2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
}

.header-row { display: flex; align-items: center; justify-content: space-between; }

.date-nav {
  display: flex; align-items: center; gap: 8px;
}

.date-nav button {
  background: var(--bg3); border: none; color: var(--text); width: 32px; height: 32px;
  border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
}

.date-nav span { font-size: 14px; color: var(--text2); font-weight: 500; min-width: 120px; text-align: center; }

.tabs {
  display: flex; gap: 0; margin-top: 12px;
}

.tab {
  flex: 1; padding: 10px 0; text-align: center; font-size: 13px; font-weight: 600;
  color: var(--text3); border: none; background: none; cursor: pointer;
  border-bottom: 2px solid transparent; transition: all 0.2s;
  text-transform: uppercase; letter-spacing: 0.5px;
}

.tab.active { color: var(--accent2); border-bottom-color: var(--accent); }

.content { padding: 16px; }

.section { display: none; }
.section.active { display: block; }

/* Week Selector */
.week-selector {
  display: flex; gap: 6px; margin-bottom: 16px;
}

.day-btn {
  flex: 1; padding: 10px 4px; border-radius: var(--radius-sm);
  border: 2px solid var(--bg4); background: var(--bg2);
  color: var(--text3); font-size: 11px; font-weight: 600;
  cursor: pointer; text-align: center; transition: all 0.2s;
}

.day-btn .day-label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 2px; }
.day-btn .day-via { display: block; font-size: 9px; font-weight: 400; opacity: 0.7; }

.day-btn.active { border-color: var(--accent); color: var(--accent2); background: rgba(108,92,231,0.1); }
.day-btn.today { box-shadow: 0 0 0 1px var(--green) inset; }
.day-btn.done { border-color: var(--green); color: var(--green2); background: rgba(0,184,148,0.08); opacity: 0.7; pointer-events: none; }
.day-btn.done .day-label::after { content: ' ✓'; font-size: 9px; }

/* Exercise Card */
.exercise-card {
  background: var(--bg2); border-radius: var(--radius); padding: 14px;
  margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.04);
}

.exercise-header {
  display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px;
}

.exercise-name { font-size: 14px; font-weight: 600; flex: 1; line-height: 1.3; }
.exercise-target { font-size: 12px; color: var(--text3); margin-top: 2px; }

.exercise-meta {
  display: flex; gap: 8px; align-items: center;
}

.rest-badge {
  font-size: 11px; color: var(--orange); background: rgba(243,156,18,0.12);
  padding: 3px 8px; border-radius: 20px; font-weight: 500; white-space: nowrap;
}

.sets-grid { display: flex; flex-direction: column; gap: 6px; }

.set-row {
  display: flex; align-items: center; gap: 8px;
  background: var(--bg3); border-radius: var(--radius-sm); padding: 8px 10px;
}

.set-label {
  font-size: 12px; font-weight: 600; color: var(--text3);
  min-width: 24px; text-align: center;
}

.set-input {
  width: 60px; padding: 8px 6px; border-radius: 6px;
  border: 1px solid var(--bg4); background: var(--bg); color: var(--text);
  font-size: 15px; text-align: center; font-weight: 500;
  -webkit-appearance: none;
}

.set-input:focus { border-color: var(--accent); outline: none; }
.set-input::placeholder { color: var(--text3); font-size: 12px; }

.set-unit { font-size: 11px; color: var(--text3); min-width: 24px; }

.set-check {
  width: 32px; height: 32px; border-radius: 50%;
  border: 2px solid var(--bg4); background: none;
  color: transparent; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; margin-left: auto; flex-shrink: 0;
}

.set-check.done { border-color: var(--green); background: var(--green); color: #fff; }

.exercise-comment {
  width: 100%; margin-top: 8px; padding: 8px 10px;
  background: var(--bg3); border: 1px solid var(--bg4);
  border-radius: var(--radius-sm); color: var(--text2);
  font-size: 13px; resize: none; font-family: inherit;
}

.exercise-comment:focus { border-color: var(--accent); outline: none; color: var(--text); }

/* Rest Timer */
.timer-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
  flex-direction: column; align-items: center; justify-content: center;
}

.timer-overlay.active { display: flex; }

.timer-display {
  font-size: 72px; font-weight: 700; font-variant-numeric: tabular-nums;
  color: var(--text); margin-bottom: 8px;
}

.timer-label { font-size: 16px; color: var(--text2); margin-bottom: 32px; }

.timer-buttons { display: flex; gap: 12px; }

.timer-btn {
  padding: 14px 32px; border-radius: 50px; border: none;
  font-size: 16px; font-weight: 600; cursor: pointer;
}

.timer-btn.skip { background: var(--bg3); color: var(--text2); }
.timer-btn.stop { background: var(--red); color: #fff; }
.timer-btn.add { background: var(--bg3); color: var(--text2); }

/* Save Button */
.save-bar {
  position: fixed; bottom: 70px; left: 0; right: 0;
  padding: 12px 16px; z-index: 90;
  background: linear-gradient(transparent, var(--bg) 30%);
}

.save-btn {
  width: 100%; padding: 16px; border-radius: var(--radius);
  border: none; font-size: 16px; font-weight: 700;
  cursor: pointer; transition: all 0.2s;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  color: #fff; text-transform: uppercase; letter-spacing: 1px;
}

.save-btn:active { transform: scale(0.98); }

.save-btn.saved { background: var(--green); }

/* Diet Section */
.meal-card {
  background: var(--bg2); border-radius: var(--radius); padding: 14px;
  margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.04);
}

.meal-header {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}

.meal-name { font-size: 15px; font-weight: 600; }
.meal-time { font-size: 12px; color: var(--text3); }

.meal-check-row {
  display: flex; align-items: center; gap: 10px; padding: 8px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}

.meal-check-row:last-child { border-bottom: none; }

.meal-checkbox {
  width: 24px; height: 24px; border-radius: 6px;
  border: 2px solid var(--bg4); background: none;
  color: transparent; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  font-size: 14px; transition: all 0.2s; flex-shrink: 0;
}

.meal-checkbox.checked { border-color: var(--green); background: var(--green); color: #fff; }

.meal-option { font-size: 13px; color: var(--text2); line-height: 1.4; }

.supplement-card {
  background: var(--bg2); border-radius: var(--radius); padding: 14px;
  margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.04);
}


.macro-summary {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
  margin-bottom: 16px;
}

.macro-box {
  background: var(--bg2); border-radius: var(--radius-sm); padding: 12px 8px;
  text-align: center; border: 1px solid rgba(255,255,255,0.04);
}

.macro-value { font-size: 20px; font-weight: 700; }
.macro-label { font-size: 10px; color: var(--text3); margin-top: 2px; text-transform: uppercase; }
.macro-box.kcal .macro-value { color: var(--orange); }
.macro-box.prot .macro-value { color: var(--red); }
.macro-box.carb .macro-value { color: var(--accent2); }
.macro-box.fat .macro-value { color: var(--green2); }

/* History Section */
.history-entry {
  background: var(--bg2); border-radius: var(--radius); padding: 14px;
  margin-bottom: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.04);
  transition: all 0.2s;
}

.history-entry:active { background: var(--bg3); }

.history-date { font-size: 13px; color: var(--text2); margin-bottom: 4px; }
.history-via { font-size: 16px; font-weight: 600; }

.delete-entry-btn {
  width: 100%; margin-top: 12px; padding: 10px;
  border-radius: var(--radius-sm); border: 1px solid rgba(231,76,60,0.3);
  background: rgba(231,76,60,0.08); color: var(--red);
  font-size: 13px; font-weight: 600; cursor: pointer;
}
.history-summary { font-size: 12px; color: var(--text3); margin-top: 4px; }

.history-detail {
  display: none; margin-top: 10px; padding-top: 10px;
  border-top: 1px solid var(--bg4);
}

.history-detail.open { display: block; }

.history-exercise { margin-bottom: 8px; }
.history-exercise-name { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 2px; }
.history-sets { font-size: 12px; color: var(--text3); }

.empty-state {
  text-align: center; padding: 40px 20px; color: var(--text3);
}

.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; line-height: 1.5; }

/* Progress mini chart */
.progress-section { margin-bottom: 20px; }
.progress-title { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: var(--text2); }

.progress-chart {
  display: flex; align-items: flex-end; gap: 3px; height: 60px;
  background: var(--bg2); border-radius: var(--radius-sm); padding: 8px;
}

.progress-bar {
  flex: 1; min-width: 8px; border-radius: 3px 3px 0 0;
  background: var(--accent); transition: height 0.3s;
}

/* Bottom Nav */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
  background: rgba(13,13,20,0.95);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex; padding: 8px 0;
  padding-bottom: max(8px, env(safe-area-inset-bottom));
}

.nav-item {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  gap: 3px; padding: 6px; border: none; background: none;
  color: var(--text3); cursor: pointer; font-size: 10px; font-weight: 500;
  transition: color 0.2s;
}

.nav-item.active { color: var(--accent2); }

.nav-icon { font-size: 22px; line-height: 1; }

/* Toast */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
  background: var(--green); color: #fff; padding: 12px 24px;
  border-radius: 50px; font-size: 14px; font-weight: 600;
  z-index: 300; transition: transform 0.3s ease; white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* Rest day */
.rest-day-msg {
  text-align: center; padding: 60px 20px;
}

.rest-day-msg .icon { font-size: 64px; margin-bottom: 16px; }
.rest-day-msg h2 { font-size: 22px; margin-bottom: 8px; color: var(--green2); }
.rest-day-msg p { color: var(--text3); font-size: 14px; }

/* Workout complete indicator */
.workout-done-badge {
  display: inline-block; font-size: 11px; padding: 2px 8px;
  background: rgba(0,184,148,0.15); color: var(--green2);
  border-radius: 20px; font-weight: 500;
}

/* History filter tabs */
.history-filters {
  display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}

.filter-btn {
  padding: 8px 14px; border-radius: 20px; border: 1px solid var(--bg4);
  background: var(--bg2); color: var(--text2); font-size: 12px;
  font-weight: 500; cursor: pointer; white-space: nowrap;
}

.filter-btn.active { border-color: var(--accent); color: var(--accent2); background: rgba(108,92,231,0.1); }

/* Confirmation dialog */
.dialog-overlay {
  display: none; position: fixed; inset: 0; z-index: 250;
  background: rgba(0,0,0,0.7); align-items: center; justify-content: center;
  padding: 20px;
}

.dialog-overlay.active { display: flex; }

.dialog {
  background: var(--bg2); border-radius: var(--radius); padding: 24px;
  max-width: 320px; width: 100%; text-align: center;
}

.dialog h3 { margin-bottom: 8px; font-size: 18px; }
.dialog p { color: var(--text2); font-size: 14px; margin-bottom: 20px; }
.dialog-buttons { display: flex; gap: 10px; }

.dialog-btn {
  flex: 1; padding: 12px; border-radius: var(--radius-sm);
  border: none; font-size: 14px; font-weight: 600; cursor: pointer;
}

.dialog-btn.cancel { background: var(--bg4); color: var(--text2); }
.dialog-btn.confirm { background: var(--accent); color: #fff; }

.previous-weight {
  font-size: 11px; color: var(--green); background: rgba(0,184,148,0.1);
  padding: 2px 6px; border-radius: 4px; margin-left: 4px;
}

.start-timer-btn {
  width: 100%; margin-top: 8px; padding: 10px;
  border-radius: var(--radius-sm); border: 1px solid;
  font-size: 13px; font-weight: 600; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}

.feedback-row {
  display: flex; gap: 6px; margin-top: 8px;
}

.feedback-btn {
  flex: 1; padding: 8px 4px; border-radius: var(--radius-sm);
  border: 1px solid var(--bg4); background: var(--bg3);
  color: var(--text3); font-size: 11px; font-weight: 600;
  cursor: pointer; text-align: center; transition: all 0.2s;
}

.feedback-btn.active[data-fb="subir"] { border-color: var(--green); color: var(--green2); background: rgba(0,184,148,0.12); }
.feedback-btn.active[data-fb="mantener"] { border-color: var(--accent); color: var(--accent2); background: rgba(108,92,231,0.12); }
.feedback-btn.active[data-fb="bajar"] { border-color: var(--red); color: var(--red); background: rgba(231,76,60,0.12); }

.prev-feedback {
  font-size: 11px; padding: 2px 8px; border-radius: 4px;
  font-weight: 600; margin-left: 4px;
}

.prev-feedback.subir { color: var(--green2); background: rgba(0,184,148,0.12); }
.prev-feedback.mantener { color: var(--accent2); background: rgba(108,92,231,0.12); }
.prev-feedback.bajar { color: var(--red); background: rgba(231,76,60,0.12); }

/* Weekly overview */
.weekly-overview {
  background: var(--bg2); border-radius: var(--radius); padding: 12px 14px;
  margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.04);
}

.weekly-overview-title {
  font-size: 11px; color: var(--text3); text-transform: uppercase;
  letter-spacing: 0.5px; font-weight: 600; margin-bottom: 8px;
}

.weekly-pills {
  display: flex; gap: 6px; flex-wrap: wrap;
}

.weekly-pill {
  font-size: 11px; padding: 4px 10px; border-radius: 20px;
  font-weight: 600; border: 1px solid var(--bg4); color: var(--text3);
  background: var(--bg3);
}

.weekly-pill.done {
  border-color: var(--green); color: var(--green2);
  background: rgba(0,184,148,0.1);
}

.weekly-pill.diet-done {
  border-color: var(--orange); color: var(--orange);
  background: rgba(243,156,18,0.1);
}

/* Diet compliance */
.compliance-bar {
  background: var(--bg3); border-radius: 20px; height: 8px;
  margin-bottom: 16px; overflow: hidden;
}

.compliance-fill {
  height: 100%; border-radius: 20px; transition: width 0.3s;
  background: linear-gradient(90deg, var(--red), var(--orange), var(--green));
}

.compliance-label {
  text-align: center; font-size: 13px; color: var(--text2); margin-bottom: 6px;
}

.compliance-pct { font-weight: 700; }

.diet-save-bar {
  position: fixed; bottom: 70px; left: 0; right: 0;
  padding: 12px 16px; z-index: 90;
  background: linear-gradient(transparent, var(--bg) 30%);
  display: none;
}

.diet-save-btn {
  width: 100%; padding: 16px; border-radius: var(--radius);
  border: none; font-size: 16px; font-weight: 700; cursor: pointer;
  background: linear-gradient(135deg, #e67e22, #f39c12);
  color: #fff; text-transform: uppercase; letter-spacing: 1px;
}

.extras-overlay {
  display: none; position: fixed; inset: 0; z-index: 250;
  background: rgba(0,0,0,0.8); align-items: center; justify-content: center;
  padding: 20px;
}

.extras-overlay.active { display: flex; }

.extras-dialog {
  background: var(--bg2); border-radius: var(--radius); padding: 24px;
  width: 100%; max-width: 360px;
}

.extras-dialog h3 { font-size: 17px; margin-bottom: 12px; }

.extras-textarea {
  width: 100%; padding: 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--bg4); background: var(--bg);
  color: var(--text); font-size: 14px; font-family: inherit;
  resize: none; min-height: 80px;
}

.extras-textarea:focus { border-color: var(--accent); outline: none; }

.extras-buttons { display: flex; gap: 10px; margin-top: 16px; }

.extras-btn {
  flex: 1; padding: 12px; border-radius: var(--radius-sm);
  border: none; font-size: 14px; font-weight: 600; cursor: pointer;
}

.extras-btn.skip { background: var(--bg4); color: var(--text2); }
.extras-btn.save { background: var(--green); color: #fff; }

/* Photo upload */
.photo-upload-area {
  border: 2px dashed var(--bg4); border-radius: var(--radius);
  padding: 20px; text-align: center; cursor: pointer;
  transition: all 0.2s; margin-bottom: 12px;
}

.photo-upload-area:active { border-color: var(--accent); }

.photo-upload-area .icon { font-size: 32px; margin-bottom: 6px; }
.photo-upload-area p { font-size: 13px; color: var(--text3); }

.photos-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
  margin-bottom: 12px;
}

.photo-thumb {
  aspect-ratio: 3/4; border-radius: var(--radius-sm);
  object-fit: cover; width: 100%; cursor: pointer;
}

.photo-lightbox {
  display: none; position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.95); align-items: center; justify-content: center;
  padding: 10px;
}

.photo-lightbox.active { display: flex; }
.photo-lightbox img { max-width: 100%; max-height: 90vh; border-radius: 8px; }
.photo-lightbox-close {
  position: absolute; top: 16px; right: 16px;
  background: rgba(255,255,255,0.2); border: none; color: #fff;
  width: 40px; height: 40px; border-radius: 50%; font-size: 20px; cursor: pointer;
}

/* Medidas Section */
.medidas-week {
  font-size: 14px; color: var(--text2); margin-bottom: 16px; text-align: center;
}

.medidas-form {
  background: var(--bg2); border-radius: var(--radius); padding: 16px;
  margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.04);
}

.medidas-form h3 { font-size: 15px; margin-bottom: 12px; }

.medida-row {
  display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
}

.medida-label {
  font-size: 13px; color: var(--text2); min-width: 100px; flex-shrink: 0;
}

.medida-input {
  flex: 1; padding: 10px 8px; border-radius: 6px;
  border: 1px solid var(--bg4); background: var(--bg); color: var(--text);
  font-size: 15px; text-align: center; font-weight: 500;
  -webkit-appearance: none; max-width: 100px;
}

.medida-input:focus { border-color: var(--accent); outline: none; }

.medida-unit { font-size: 12px; color: var(--text3); min-width: 24px; }

.medida-diff {
  font-size: 11px; font-weight: 600; min-width: 50px; text-align: right;
}

.medida-diff.up { color: var(--orange); }
.medida-diff.down { color: var(--green); }
.medida-diff.neutral { color: var(--text3); }

.medidas-save-btn {
  width: 100%; padding: 14px; border-radius: var(--radius);
  border: none; font-size: 15px; font-weight: 700; cursor: pointer;
  background: linear-gradient(135deg, var(--accent), #8b5cf6);
  color: #fff; margin-top: 8px;
}

.medidas-history { margin-top: 16px; }

.medidas-history-title {
  font-size: 14px; font-weight: 600; margin-bottom: 10px; color: var(--text2);
}

.medidas-table {
  width: 100%; border-collapse: collapse; font-size: 12px;
  background: var(--bg2); border-radius: var(--radius); overflow: hidden;

const MEALS = [

      { id: 'cena-carbs', label: 'Carbos', desc: '150g pan · 12 biscotes · 12 tortas arroz · 500g patata · 400g boniato · 300g arroz/pasta/legumbre cocidos (100g crudo)' },
      { id: 'cena-grasa', label: 'Grasa', desc: '1 cuch. aceite oliva · ½ aguacate · 2 cuch. tomate frito · 1 cuch. salsa' },

let currentDate = new Date();
let selectedVia = null;
let selectedSession = null;
let workoutDate = new Date();
let dietDate = new Date();
let timerInterval = null;
let timerSeconds = 0;

function dateKey(d) {
  const dd = d || currentDate;
  return dd.toISOString().split('T')[0];
}

function formatDate(d) {
  const days = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  return `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
}

function isToday(d) {
  const t = new Date();
  return d.getDate() === t.getDate() && d.getMonth() === t.getMonth() && d.getFullYear() === t.getFullYear();
}

function changeWorkoutDate(delta) {
  workoutDate.setDate(workoutDate.getDate() + delta);
  selectedSession = null;
  selectedVia = null;
  document.getElementById('saveBar').style.display = 'none';
  renderWorkoutDateDisplay();
  renderSessionSelector();
  renderExercises();
}

function renderWorkoutDateDisplay() {
  const t = new Date();
  const isToday = workoutDate.getDate() === t.getDate() && workoutDate.getMonth() === t.getMonth() && workoutDate.getFullYear() === t.getFullYear();
  document.getElementById('workoutDateDisplay').textContent = isToday ? 'Hoy · ' + formatDate(workoutDate) : formatDate(workoutDate);
}

function getWeekRange(refDate) {
  const d = new Date(refDate);
  const dow = d.getDay();
  const mon = new Date(d); mon.setDate(d.getDate() - ((dow + 6) % 7));
  mon.setHours(0,0,0,0);
  const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
  sun.setHours(23,59,59,999);
  return { mon, sun };
}

function renderWeeklyDietOverview() {
  const { mon, sun } = getWeekRange(dietDate);
  const days = [];
  const d = new Date(mon);
  while (d <= sun) {
    const dk = d.toISOString().split('T')[0];
    const data = getStorage('diet-' + dk);
    if (data && data.savedAt) days.push({ date: new Date(d), data });
    d.setDate(d.getDate() + 1);
  }

  const allIds = getAllDietCheckIds();
  const months = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const dayNames = ['D','L','M','X','J','V','S'];
  const label = `${mon.getDate()} - ${sun.getDate()} ${months[sun.getMonth()]}`;

  let html = `<div class="weekly-overview">
    <div class="weekly-overview-title">Semana ${label} · ${days.length}/7 días registrados</div>
    <div class="weekly-pills">`;

  const cursor = new Date(mon);
  for (let i = 0; i < 7; i++) {
    const dk = cursor.toISOString().split('T')[0];
    const data = getStorage('diet-' + dk);
    const done = data && data.savedAt;
    let pct = '';
    if (done) {
      const checked = allIds.filter(id => data[id]).length;
      pct = ' ' + Math.round((checked / allIds.length) * 100) + '%';
    }
    html += `<span class="weekly-pill ${done ? 'diet-done' : ''}">${dayNames[cursor.getDay()]}${pct}</span>`;
    cursor.setDate(cursor.getDate() + 1);
  }

  html += '</div></div>';
  document.getElementById('dietWeeklyOverview').innerHTML = html;
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.nav-item').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('sec-' + tab).classList.add('active');
  document.getElementById('saveBar').style.display = (tab === 'workout' && selectedVia) ? '' : 'none';
  document.getElementById('dietSaveBar').style.display = (tab === 'diet') ? 'block' : 'none';
  if (tab === 'history') renderHistory();
  if (tab === 'medidas') renderMedidas();
  if (tab === 'diet') renderDiet();
}

function getStorage(key) {
  try { return JSON.parse(localStorage.getItem(key)) || null; } catch { return null; }
}

function setStorage(key, val) {
  localStorage.setItem(key, JSON.stringify(val));
}

function workoutDateKey() {
  return workoutDate.toISOString().split('T')[0];
}

function getSelectedDayKey() {
  return workoutDateKey();
}

function getPreviousExerciseData(viaId, exerciseIdx) {
  const allKeys = Object.keys(localStorage).filter(k => k.startsWith('workout-')).sort().reverse();
  const currentKey = 'workout-' + getSelectedDayKey();
  for (const key of allKeys) {
    if (key === currentKey) continue;
    const data = getStorage(key);
    if (data && data.viaId === viaId) {
      const ex = data.exercises[exerciseIdx];
      if (ex && ex.sets) {
        const maxWeight = Math.max(...ex.sets.map(s => parseFloat(s.weight) || 0));
        if (maxWeight > 0) return { maxWeight, feedback: ex.feedback || null };
      }
    }
  }
  return null;
}

function setFeedback(exIdx, value, btn) {
  const row = btn.parentElement;
  row.querySelectorAll('.feedback-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function selectSession(sessionId) {
  const session = PROGRAM.sessions.find(s => s.id === sessionId);
  if (!session) return;
  selectedSession = sessionId;
  selectedVia = session.viaId;
  document.getElementById('saveBar').style.display = 'block';
  renderSessionSelector();
  renderExercises();
}

function getWeekCompletedSessions() {
  const { mon, sun } = getWeekRange(workoutDate);
  const done = new Set();
  const weekWorkouts = [];
  Object.keys(localStorage)
    .filter(k => k.startsWith('workout-'))
    .forEach(k => {
      const d = getStorage(k);
      if (!d || !d.date) return;
      const dt = new Date(d.date + 'T12:00:00');
      if (dt >= mon && dt <= sun) weekWorkouts.push(d);
    });

  weekWorkouts.forEach(w => {
    if (w.sessionId) {
      done.add(w.sessionId);
    } else if (w.viaId) {
      const matching = PROGRAM.sessions.filter(s => s.viaId === w.viaId);
      const alreadyDone = matching.find(s => done.has(s.id));
      const next = matching.find(s => !done.has(s.id));
      if (next) done.add(next.id);
    }
  });
  return done;
}

function renderSessionSelector() {
  const done = getWeekCompletedSessions();
  let html = '';
  PROGRAM.sessions.forEach(session => {
    const via = PROGRAM.vias.find(v => v.id === session.viaId);
    const isSelected = selectedSession === session.id;
    const isDone = done.has(session.id);
    let cls = 'day-btn';
    if (isDone && !isSelected) cls += ' done';
    if (isSelected) cls += ' active';
    const disabled = isDone && !isSelected ? 'disabled' : '';
    html += `<button class="${cls}" ${disabled} onclick="selectSession(${session.id})">
      <span class="day-label">${session.label}</span>
      <span class="day-via">${via.subtitle}</span>
    </button>`;
  });
  document.getElementById('sessionSelector').innerHTML = html;
}

function renderExercises() {
  const container = document.getElementById('exerciseList');

  // Auto-detect saved session for this date
  const dayKey = getSelectedDayKey();
  const savedWorkout = getStorage('workout-' + dayKey);
  if (savedWorkout && !selectedSession) {
    selectedSession = savedWorkout.sessionId || null;
    selectedVia = savedWorkout.viaId;
    renderSessionSelector();
  }

  if (!selectedVia || selectedVia <= 0) {
    container.innerHTML = `<div class="empty-state">
      <div class="icon">&#128170;</div>
      <p>Selecciona una sesión para empezar</p>
    </div>`;
    return;
  }

  const via = PROGRAM.vias.find(v => v.id === selectedVia);
  let html = '';

  via.exercises.forEach((ex, ei) => {
    const prevData = getPreviousExerciseData(via.id, ei);
    const prevWeight = prevData ? prevData.maxWeight : null;
    const prevFeedback = prevData ? prevData.feedback : null;
    const saved = savedWorkout && savedWorkout.viaId === via.id ? savedWorkout.exercises[ei] : null;
    const currentFb = saved ? saved.feedback : '';

    let feedbackBadge = '';
    if (prevFeedback) {
      const fbLabels = { subir: '↑ Subir peso', mantener: '= Mantener', bajar: '↓ Bajar peso' };
      feedbackBadge = `<span class="prev-feedback ${prevFeedback}">${fbLabels[prevFeedback]}</span>`;
    }

    html += `<div class="exercise-card" id="ex-${ei}">
      <div class="exercise-header">
        <div>
          <div class="exercise-name">${ex.name}${prevWeight ? `<span class="previous-weight">prev: ${prevWeight}kg</span>` : ''}${feedbackBadge}</div>
          <div class="exercise-target">${ex.sets}×${ex.reps}${ex.note ? ' · ' + ex.note : ''}</div>
        </div>
        <div class="exercise-meta">
          <span class="rest-badge">${ex.rest}s</span>
        </div>
      </div>
      <div class="sets-grid">`;

    for (let s = 0; s < ex.sets; s++) {
      const savedSet = saved && saved.sets[s] ? saved.sets[s] : {};
      const isDone = savedSet.done || false;
      html += `<div class="set-row">
        <span class="set-label">${s + 1}</span>
        <input class="set-input" type="number" inputmode="decimal" placeholder="kg"
          data-ex="${ei}" data-set="${s}" data-field="weight"
          value="${savedSet.weight || ''}" onchange="onSetChange(this)">
        <span class="set-unit">kg</span>
        <input class="set-input" type="number" inputmode="numeric" placeholder="${ex.reps}"
          data-ex="${ei}" data-set="${s}" data-field="reps"
          value="${savedSet.reps || ''}" onchange="onSetChange(this)">
        <span class="set-unit">reps</span>
        <button class="set-check ${isDone ? 'done' : ''}" data-ex="${ei}" data-set="${s}"
          onclick="toggleSet(this, ${ex.rest})">✓</button>
      </div>`;
    }

    html += `</div>
      <div class="feedback-row">
        <button class="feedback-btn ${currentFb === 'subir' ? 'active' : ''}" data-fb="subir" data-ex="${ei}" onclick="setFeedback(${ei},'subir',this)">↑ Subir</button>
        <button class="feedback-btn ${currentFb === 'mantener' ? 'active' : ''}" data-fb="mantener" data-ex="${ei}" onclick="setFeedback(${ei},'mantener',this)">= Mantener</button>
        <button class="feedback-btn ${currentFb === 'bajar' ? 'active' : ''}" data-fb="bajar" data-ex="${ei}" onclick="setFeedback(${ei},'bajar',this)">↓ Bajar</button>
      </div>
      <textarea class="exercise-comment" rows="1" placeholder="Notas..."
        data-ex="${ei}">${saved && saved.comment ? saved.comment : ''}</textarea>
    </div>`;
  });

  // Cardio post-entreno
  const cardioKey = 'cardio-' + dayKey;
  const cardioDone = getStorage(cardioKey);
  html += `<div class="exercise-card" style="border-left: 3px solid var(--green);">
    <div class="exercise-header">
      <div>
        <div class="exercise-name">🏃 Cardio post-entreno</div>
        <div class="exercise-target">15 min · Baja intensidad</div>
      </div>
      <div class="exercise-meta">
        <button class="set-check ${cardioDone ? 'done' : ''}" onclick="toggleCardio(this)" style="width:40px;height:40px;font-size:20px;">✓</button>
      </div>

function toggleCardio(btn) {
  btn.classList.toggle('done');

}

function onSetChange(input) {
  // No auto-save: only persist on explicit "Guardar"
}

function toggleSet(btn, restTime) {
  btn.classList.toggle('done');
  if (btn.classList.contains('done')) {
    startTimer(restTime);
  }
}

function collectWorkoutData() {
  if (!selectedVia || selectedVia <= 0) return null;
  const via = PROGRAM.vias.find(v => v.id === selectedVia);
  const exercises = via.exercises.map((ex, ei) => {
    const sets = [];
    for (let s = 0; s < ex.sets; s++) {
      const weightInput = document.querySelector(`[data-ex="${ei}"][data-set="${s}"][data-field="weight"]`);
      const repsInput = document.querySelector(`[data-ex="${ei}"][data-set="${s}"][data-field="reps"]`);
      const checkBtn = document.querySelector(`.set-check[data-ex="${ei}"][data-set="${s}"]`);
      sets.push({
        weight: weightInput ? weightInput.value : '',
        reps: repsInput ? repsInput.value : '',
        done: checkBtn ? checkBtn.classList.contains('done') : false
      });
    }
    const commentEl = document.querySelector(`textarea[data-ex="${ei}"]`);
    const activeFb = document.querySelector(`.feedback-btn.active[data-ex="${ei}"]`);
    const feedback = activeFb ? activeFb.dataset.fb : '';
    return { name: ex.name, target: `${ex.sets}×${ex.reps}`, sets, comment: commentEl ? commentEl.value : '', feedback };
  });

  const cardioDone = getStorage('cardio-' + getSelectedDayKey()) || false;
  return { date: getSelectedDayKey(), viaId: selectedVia, viaName: via.name + ' ' + via.subtitle, sessionId: selectedSession, exercises, cardio: cardioDone };
}

function saveWorkout() {
  const data = collectWorkoutData();
  if (!data) return;
  setStorage('workout-' + getSelectedDayKey(), data);
  showToast('Entreno guardado');
  renderSessionSelector();
  const btn = document.getElementById('saveBtn');
  btn.classList.add('saved');
  btn.textContent = '✓ Guardado';
  setTimeout(() => { btn.classList.remove('saved'); btn.textContent = 'Guardar Entreno'; }, 2000);
}

function startTimer(seconds) {
  if (timerInterval) clearInterval(timerInterval);
  timerSeconds = seconds;
  updateTimerDisplay();
  document.getElementById('timerLabel').textContent = `Descanso · ${seconds}s`;
  document.getElementById('timerOverlay').classList.add('active');

  timerInterval = setInterval(() => {
    timerSeconds--;
    updateTimerDisplay();
    if (timerSeconds <= 0) {
      clearInterval(timerInterval);
      timerInterval = null;
      try {
        if ('vibrate' in navigator) navigator.vibrate([200, 100, 200, 100, 200]);
      } catch(e) {}
      document.getElementById('timerDisplay').style.color = 'var(--green2)';
      document.getElementById('timerLabel').textContent = '¡A entrenar!';
      setTimeout(() => stopTimer(), 2000);
    }
  }, 1000);
}

function addTimerTime(s) {
  timerSeconds += s;
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const m = Math.floor(Math.abs(timerSeconds) / 60);
  const s = Math.abs(timerSeconds) % 60;
  document.getElementById('timerDisplay').textContent = `${m}:${s.toString().padStart(2, '0')}`;
  document.getElementById('timerDisplay').style.color = timerSeconds <= 5 && timerSeconds > 0 ? 'var(--orange)' : timerSeconds <= 0 ? 'var(--green2)' : 'var(--text)';
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = null;
  document.getElementById('timerOverlay').classList.remove('active');
}

// HISTORY
function renderHistory() {
  const entries = [];

  // Collect workouts
  Object.keys(localStorage).filter(k => k.startsWith('workout-')).forEach(key => {
    const data = getStorage(key);
    if (data) entries.push({ type: 'workout', key, date: data.date, data });
  });

  // Collect diet days
  Object.keys(localStorage).filter(k => k.startsWith('diet-')).forEach(key => {
    const data = getStorage(key);
    if (data && data.savedAt) entries.push({ type: 'diet', key, date: key.replace('diet-', ''), data });
  });

  // Collect medidas
  Object.keys(localStorage).filter(k => k.startsWith('medidas-')).forEach(key => {
    const data = getStorage(key);
    if (data && data.peso) entries.push({ type: 'medidas', key, date: key.replace('medidas-', ''), data });
  });

  entries.sort((a, b) => b.date.localeCompare(a.date));

  let html = `<div class="history-filters">
    <button class="filter-btn active" onclick="filterHistory('all', this)">Todo</button>
    <button class="filter-btn" onclick="filterHistory('workout', this)">Entreno</button>
    <button class="filter-btn" onclick="filterHistory('diet', this)">Dieta</button>
    <button class="filter-btn" onclick="filterHistory('medidas', this)">Medidas</button>
  </div>`;

  if (entries.length === 0) {
    html += `<div class="empty-state">
      <div class="icon">&#128203;</div>
      <p>Aún no hay registros.<br>¡Empieza hoy!</p>
    </div>`;
  } else {
    html += '<div id="historyList">';
    entries.forEach(entry => {
      const d = new Date(entry.date + 'T12:00:00');

      if (entry.type === 'workout') {
        const data = entry.data;
        const completedSets = data.exercises.reduce((sum, ex) => sum + ex.sets.filter(s => s.done).length, 0);
        const totalSets = data.exercises.reduce((sum, ex) => sum + ex.sets.length, 0);
        const totalVolume = data.exercises.reduce((sum, ex) =>
          sum + ex.sets.reduce((ss, s) => ss + (parseFloat(s.weight) || 0) * (parseInt(s.reps) || 0), 0), 0);

        html += `<div class="history-entry" data-type="workout" onclick="toggleHistoryDetail(this)">
          <div class="history-date">${formatDate(d)}</div>
          <div class="history-via">&#9947; ${data.viaName} ${completedSets === totalSets ? '<span class="workout-done-badge">Completo</span>' : ''}${data.cardio ? ' <span class="workout-done-badge" style="background:rgba(0,184,148,0.15)">Cardio ✓</span>' : ''}</div>
          <div class="history-summary">${completedSets}/${totalSets} series · ${Math.round(totalVolume)} kg vol. total</div>
          <div class="history-detail">`;

        data.exercises.forEach(ex => {
          const setsStr = ex.sets.filter(s => s.weight || s.reps).map(s => `${s.weight || '?'}kg×${s.reps || '?'}`).join(' | ');
          const fbLabel = ex.feedback ? (ex.feedback === 'subir' ? ' ↑' : ex.feedback === 'bajar' ? ' ↓' : ' =') : '';
          if (setsStr) {
            html += `<div class="history-exercise">
              <div class="history-exercise-name">${ex.name}${fbLabel}</div>
              <div class="history-sets">${setsStr}${ex.comment ? ' · ' + ex.comment : ''}</div>
            </div>`;
          }
        });

        html += `<button class="delete-entry-btn" onclick="confirmDelete('${entry.key}', 'workout', event)">Eliminar</button>`;
        html += '</div></div>';

      } else if (entry.type === 'diet') {
        const data = entry.data;
        const allIds = getAllDietCheckIds();
        const checked = allIds.filter(id => data[id]).length;
        const pct = allIds.length > 0 ? Math.round((checked / allIds.length) * 100) : 0;

        html += `<div class="history-entry" data-type="diet" onclick="toggleHistoryDetail(this)">
          <div class="history-date">${formatDate(d)}</div>
          <div class="history-via">&#9749; Dieta <span class="workout-done-badge" style="background:rgba(243,156,18,0.15); color:var(--orange);">${pct}%</span></div>
          <div class="history-summary">${checked}/${allIds.length} items completados${data.extras ? ' · Extras: ' + data.extras : ''}</div>
          <div class="history-detail">`;

        MEALS.forEach(meal => {
          const items = meal.options || meal.items || [];
          items.forEach(item => {
            const done = data[item.id];
            html += `<div class="history-exercise">
              <div class="history-exercise-name">${done ? '✓' : '✗'} ${item.label || item.label}</div>
            </div>`;
          });
        });

        if (data.creatina) html += '<div class="history-exercise"><div class="history-exercise-name">✓ Creatina</div></div>';
        if (data.extras) html += `<div class="history-exercise"><div class="history-exercise-name" style="color:var(--orange);">🍕 ${data.extras}</div></div>`;

        html += `<button class="delete-entry-btn" onclick="confirmDelete('${entry.key}', 'diet', event)">Eliminar</button>`;
        html += '</div></div>';

      } else if (entry.type === 'medidas') {
        const data = entry.data;
        const hasPhotos = data.photos && data.photos.length > 0;
        html += `<div class="history-entry" data-type="medidas" onclick="toggleHistoryDetail(this)">
          <div class="history-date">${formatDate(d)}</div>
          <div class="history-via">&#9881; Medidas${hasPhotos ? ' 📷' : ''}</div>
          <div class="history-summary">Peso: ${data.peso || '—'}kg${data.pecho ? ' · Pecho: ' + data.pecho : ''}${data.cintura ? ' · Cintura: ' + data.cintura : ''}</div>
          <div class="history-detail">`;

        MEDIDAS_FIELDS.forEach(f => {
          if (data[f.id]) html += `<div class="history-exercise"><div class="history-exercise-name">${f.icon} ${f.label}: ${data[f.id]} ${f.unit}</div></div>`;
        });

        if (hasPhotos) {
          html += '<div class="photos-grid" style="margin-top:8px;">';
          data.photos.forEach(p => {
            html += `<img class="photo-thumb" src="${p}" onclick="event.stopPropagation(); openHistoryPhoto(this.src)">`;
          });
          html += '</div>';
        }

        if (data.notes) html += `<div class="history-exercise"><div class="history-exercise-name">📝 ${data.notes}</div></div>`;

        html += `<button class="delete-entry-btn" onclick="confirmDelete('${entry.key}', 'medidas', event)">Eliminar</button>`;
        html += '</div></div>';
      }
    });
    html += '</div>';
  }

  document.getElementById('historyInner').innerHTML = html;
}

  const ids = [];
  MEALS.forEach(meal => {

  { id: 'gemelo', label: 'Gemelo', unit: 'cm', icon: '🦵' },
  { id: 'hombros', label: 'Hombros', unit: 'cm', icon: '📐' },
];

let medidasDate = new Date();

function getCurrentFriday() {
  const d = new Date(medidasDate);
  const day = d.getDay();
  const diff = (day <= 5) ? (5 - day) : (5 - day + 7);
  d.setDate(d.getDate() + diff);
  return d;
}

function changeMedidasWeek(delta) {
  medidasDate.setDate(medidasDate.getDate() + (delta * 7));
  renderMedidas();
}

function fridayKey(d) {
  return 'medidas-' + d.toISOString().split('T')[0];
}

function getAllMedidas() {
  return Object.keys(localStorage)
    .filter(k => k.startsWith('medidas-'))
    .sort()
    .reverse()
    .map(k => ({ key: k, date: k.replace('medidas-', ''), ...getStorage(k) }));
}

function getPreviousMedidas(currentKey) {
  const all = getAllMedidas();
  const idx = all.findIndex(m => m.key === currentKey);
  if (idx >= 0 && idx < all.length - 1) return all[idx + 1];
  if (idx < 0 && all.length > 0) return all[0];
  return null;
}

function renderMedidas() {
  const friday = getCurrentFriday();
  const key = fridayKey(friday);
  const saved = getStorage(key) || {};
  const prev = getPreviousMedidas(key);
  const isFridayToday = new Date().getDay() === 5;

  let html = '';

  html += `<div class="date-nav" style="justify-content:center; margin-bottom:12px;">
    <button onclick="changeMedidasWeek(-1)">&#8249;</button>
    <span style="min-width:140px; text-align:center;">Semana del ${formatDate(friday)}</span>
    <button onclick="changeMedidasWeek(1)">&#8250;</button>
  </div>`;

  html += `<div class="medidas-form"><h3>📏 Medidas de la semana</h3>`;

  MEDIDAS_FIELDS.forEach(f => {
    const val = saved[f.id] || '';
    let diffHtml = '';
    if (prev && prev[f.id] && val) {
      const diff = (parseFloat(val) - parseFloat(prev[f.id])).toFixed(1);
      const cls = diff > 0 ? 'up' : diff < 0 ? 'down' : 'neutral';
      const sign = diff > 0 ? '+' : '';
      diffHtml = `<span class="medida-diff ${cls}">${sign}${diff}</span>`;
    }
    html += `<div class="medida-row">
      <span class="medida-label">${f.icon} ${f.label}</span>
      <input class="medida-input" type="number" inputmode="decimal" step="0.1"
        placeholder="—" value="${val}" data-medida="${f.id}"
        onchange="onMedidaChange()">
      <span class="medida-unit">${f.unit}</span>
      ${diffHtml}
    </div>`;
  });

  // Photos
  const photos = saved.photos || [];
  html += `<div style="margin-top:12px;">
    <div style="font-size:13px; font-weight:600; color:var(--text2); margin-bottom:8px;">📸 Fotos de la semana</div>`;

  if (photos.length > 0) {
    html += '<div class="photos-grid">';
    photos.forEach((p, i) => {
      html += `<img class="photo-thumb" src="${p}" onclick="openPhoto(${i})" alt="Foto ${i+1}">`;
    });
    html += '</div>';
  }

  html += `<div class="photo-upload-area" onclick="document.getElementById('photoInput').click()">
      <div class="icon">📷</div>
      <p>Toca para añadir foto</p>
    </div>
    <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="addMedidaPhoto(event)">
  </div>`;

  html += `<textarea class="exercise-comment" rows="2" placeholder="Notas: sensaciones, etc."
    id="medidasNotes" onchange="onMedidaChange()">${saved.notes || ''}</textarea>
  <button class="medidas-save-btn" onclick="saveMedidas()">Guardar medidas</button>
  </div>`;

  // Historial de medidas
  const allMedidas = getAllMedidas();
  if (allMedidas.length > 0) {
    html += `<div class="medidas-history">
      <div class="medidas-history-title">Historial de medidas</div>
      <div style="overflow-x:auto; -webkit-overflow-scrolling:touch;">
      <table class="medidas-table">
        <thead><tr>
          <th>Fecha</th>
          <th>Peso</th>
          <th>Pecho</th>
          <th>Cint.</th>
          <th>Cad.</th>
          <th>Bíc.D</th>
          <th>Bíc.I</th>
          <th>Mus.D</th>
          <th>Mus.I</th>
          <th>Gem.</th>
          <th>Homb.</th>
        </tr></thead><tbody>`;

    allMedidas.forEach(m => {
      const d = new Date(m.date + 'T12:00:00');
      const hasPhotos = m.photos && m.photos.length > 0;
      html += `<tr>
        <td class="date-col">${formatDate(d)}${hasPhotos ? ' 📷' : ''}</td>`;
      MEDIDAS_FIELDS.forEach(f => {
        html += `<td>${m[f.id] || '—'}</td>`;
      });
      html += `</tr>`;
    });

    html += `</tbody></table></div></div>`;
  }

  document.getElementById('medidasContent').innerHTML = html;
}

function onMedidaChange() {
  const friday = getCurrentFriday();
  const key = fridayKey(friday);
  const data = getStorage(key) || {};
  document.querySelectorAll('[data-medida]').forEach(input => {
    const field = input.dataset.medida;
    if (input.value) data[field] = input.value;
    else delete data[field];
  });
  const notes = document.getElementById('medidasNotes');
  if (notes) data.notes = notes.value;
  setStorage(key, data);
}

function saveMedidas() {
  onMedidaChange();
  showToast('Medidas guardadas');
}

function addMedidaPhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const maxSize = 600;
      let w = img.width, h = img.height;
      if (w > h) { if (w > maxSize) { h = h * maxSize / w; w = maxSize; } }
      else { if (h > maxSize) { w = w * maxSize / h; h = maxSize; } }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.7);

      const friday = getCurrentFriday();
      const key = fridayKey(friday);
      const saved = getStorage(key) || {};
      if (!saved.photos) saved.photos = [];
      saved.photos.push(dataUrl);
      try {
        setStorage(key, saved);
        showToast('Foto añadida');
        renderMedidas();
      } catch (e) {
        showToast('Sin espacio. Exporta backup primero.');
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function openPhoto(idx) {
  const friday = getCurrentFriday();
  const key = fridayKey(friday);
  const saved = getStorage(key) || {};
  const photos = saved.photos || [];
  if (!photos[idx]) return;
  const lb = document.getElementById('photoLightbox');
  document.getElementById('lightboxImg').src = photos[idx];
  const delBtn = document.getElementById('lightboxDeleteBtn');
  delBtn.style.display = '';
  delBtn.onclick = function() {
    if (confirm('¿Eliminar esta foto?')) {
      photos.splice(idx, 1);
      saved.photos = photos;
      setStorage(key, saved);
      closeLightbox();
      renderMedidas();
    }
  };
  lb.classList.add('active');
}

function closeLightbox() {
  document.getElementById('photoLightbox').classList.remove('active');
}

// Keyboard handling for mobile: auto-advance to next input
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const el = document.activeElement;
    if (el && el.classList.contains('set-input')) {
      e.preventDefault();
      const inputs = Array.from(document.querySelectorAll('.set-input'));
      const idx = inputs.indexOf(el);
      if (idx < inputs.length - 1) {
        inputs[idx + 1].focus();
        inputs[idx + 1].select();
      } else {
        el.blur();
      }
    }
  }
});

// Prevent pull-to-refresh on mobile when scrolling timer
document.getElementById('timerOverlay').addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// Init
render();

// Backup reminder: check on every load
(function backupReminder() {
  const lastBackup = localStorage.getItem('lastBackupDate');
  const now = new Date();
  const daysSince = lastBackup ? Math.floor((now - new Date(lastBackup)) / 86400000) : 999;
  const workoutCount = Object.keys(localStorage).filter(k => k.startsWith('workout-')).length;
  if (workoutCount > 0 && daysSince >= 7) {
    setTimeout(() => {
      if (confirm('Llevas ' + (lastBackup ? daysSince + ' días' : 'tiempo') + ' sin hacer backup.\n\n¿Exportar copia de seguridad ahora?')) {
        exportData();
      }
    }, 1500);
  }
})();

// BACKUP: Export / Import
function exportData() {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('workout-') || key.startsWith('diet-') || key.startsWith('medidas-') || key.startsWith('cardio-')) {
      data[key] = getStorage(key);
    }
  }
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `marc-tracker-backup-${dateKey()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  localStorage.setItem('lastBackupDate', new Date().toISOString());
  showToast('Backup descargado');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      const keys = Object.keys(data);
      if (keys.length === 0) { showToast('Fichero vacío'); return; }
      let count = 0;
      keys.forEach(key => {
        if (key.startsWith('workout-') || key.startsWith('diet-') || key.startsWith('medidas-') || key.startsWith('cardio-')) {
          setStorage(key, data[key]);
          count++;
        }
      });
      showToast(`${count} registros importados`);
      render();
      if (document.querySelector('.tab[data-tab="history"]').classList.contains('active')) renderHistory();
    } catch (err) {
      showToast('Error al importar');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// PWA: register proper Service Worker file for reliable offline support
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(reg => {
    reg.update();
  }).catch(() => {});
}
</script>
