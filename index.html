function renderDiet() {
  const dk = dietDateKey();
  const key = 'diet-' + dk;
  const saved = getStorage(key) || {};

  const t = new Date();
  const isTodayDiet = dietDate.getDate() === t.getDate() && dietDate.getMonth() === t.getMonth() && dietDate.getFullYear() === t.getFullYear();
  const display = document.getElementById('dietDateDisplay');
  if (display) display.textContent = isTodayDiet ? 'Hoy · ' + formatDate(dietDate) : formatDate(dietDate);

  let html = '';
  const allCheckIds = [];
  let dailyKcal = 0;

  MEALS.forEach(meal => {
    let mealKcal = 0;
    meal.items.forEach(item => {
      const val = saved[item.id];
      if (item.choices) {
        const ci = (val && typeof val === 'object' && val.choice !== undefined) ? val.choice : 0;
        const c = item.choices[ci];
        const q = (val && typeof val === 'object' && val.qty !== undefined) ? val.qty : c.qty;
        mealKcal += (q / c.qty) * c.kcal;
      } else if (item.kcal) {
        mealKcal += item.kcal;
      }
    });
    dailyKcal += mealKcal;

    html += `<div class="meal-card">
      <div class="meal-header">
        <span class="meal-name">${meal.icon} ${meal.name}</span>
        <span class="meal-kcal">~${Math.round(mealKcal)} kcal</span>
      </div>`;

    meal.items.forEach(item => {
      allCheckIds.push(item.id);
      const val = saved[item.id];
      const done = isDietDone(saved, item.id);

      if (item.choices) {
        const choiceIdx = (val && typeof val === 'object' && val.choice !== undefined) ? val.choice : 0;
        const selectedChoice = item.choices[choiceIdx];
        const qty = (val && typeof val === 'object' && val.qty !== undefined) ? val.qty : selectedChoice.qty;

        html += `<div class="diet-item">
          <div class="diet-item-row">
            <button class="meal-checkbox ${done ? 'checked' : ''}"
              onclick="toggleDietItem('${item.id}')">✓</button>
            <span class="diet-item-label">${item.label}</span>
          </div>
          <div class="diet-item-controls">
            <select class="diet-select" data-diet-id="${item.id}" onchange="onDietChoiceChange('${item.id}', this)">`;

        item.choices.forEach((c, ci) => {
          html += `<option value="${ci}" ${ci === choiceIdx ? 'selected' : ''}>${c.name}</option>`;
        });

        html += `</select>
            <div class="diet-qty-wrap">
              <input type="number" inputmode="decimal" class="diet-qty" value="${qty}"
                data-diet-id="${item.id}" step="any"
                onchange="onDietQtyChange('${item.id}', this)">
              <span class="diet-unit">${selectedChoice.unit}</span>
            </div>
          </div>
        </div>`;
      } else {
        html += `<div class="meal-check-row">
          <button class="meal-checkbox ${done ? 'checked' : ''}"
            onclick="toggleDiet('${item.id}', this)">✓</button>
          <span class="meal-option"><strong>${item.label}</strong>${item.desc ? '<br>' + item.desc : ''}</span>
        </div>`;
      }
    });

    html += '</div>';
  });


  if (saved.extras) {
    html += `<div class="supplement-card">
      <div class="meal-header"><span class="meal-name">🍕 Extras</span></div>
      <p style="font-size:13px; color:var(--text2); padding: 4px 0;">${saved.extras}</p>
    </div>`;
  }

  document.getElementById('dietContent').innerHTML = html;

  const kcalEl = document.getElementById('dailyKcalValue');
  if (kcalEl) kcalEl.textContent = '~' + Math.round(dailyKcal);

  const checkedCount = allCheckIds.filter(id => isDietDone(saved, id)).length;
  const total = allCheckIds.length;
  const pct = total > 0 ? Math.round((checkedCount / total) * 100) : 0;
  document.getElementById('dietCompliance').innerHTML = `
    <div class="compliance-label"><span class="compliance-pct">${pct}%</span> cumplimiento</div>
    <div class="compliance-bar"><div class="compliance-fill" style="width:${pct}%"></div></div>`;
}

function toggleDiet(id, btn) {
  const key = 'diet-' + dietDateKey();
  const saved = getStorage(key) || {};
  saved[id] = !isDietDone(saved, id);
  setStorage(key, saved);
  renderDiet();
}

function toggleDietItem(id) {
  const key = 'diet-' + dietDateKey();
  const saved = getStorage(key) || {};
  let val = saved[id];
  let item = null;
  MEALS.forEach(m => m.items.forEach(i => { if (i.id === id) item = i; }));

  if (val && typeof val === 'object') {
    val.done = !val.done;
  } else if (val === true) {
    val = { choice: 0, qty: item.choices[0].qty, done: false };
  } else {
    val = { choice: 0, qty: item.choices[0].qty, done: true };
  }
  saved[id] = val;
  setStorage(key, saved);
  renderDiet();
}

function onDietChoiceChange(id, select) {
  const key = 'diet-' + dietDateKey();
  const saved = getStorage(key) || {};
  const choiceIdx = parseInt(select.value);
  let item = null;
  MEALS.forEach(m => m.items.forEach(i => { if (i.id === id) item = i; }));
  if (!item || !item.choices) return;

  const choice = item.choices[choiceIdx];
  let val = saved[id];
  if (val && typeof val === 'object') {
    val.choice = choiceIdx;
    val.qty = choice.qty;
  } else {
    val = { choice: choiceIdx, qty: choice.qty, done: val === true };
  }
  saved[id] = val;
  setStorage(key, saved);
  renderDiet();
}

function onDietQtyChange(id, input) {
  const key = 'diet-' + dietDateKey();
  const saved = getStorage(key) || {};
  const qty = parseFloat(input.value) || 0;
  let val = saved[id];
  if (val && typeof val === 'object') {
    val.qty = qty;
  } else {
    val = { choice: 0, qty: qty, done: val === true };
  }
  saved[id] = val;
  setStorage(key, saved);
}

function showExtrasPopup() {
  document.getElementById('extrasText').value = '';
  document.getElementById('extrasOverlay').classList.add('active');
}

function saveDietDay(extras) {
  document.getElementById('extrasOverlay').classList.remove('active');
  const key = 'diet-' + dietDateKey();
  const saved = getStorage(key) || {};
  if (extras) saved.extras = extras;
  saved.savedAt = new Date().toISOString();
  setStorage(key, saved);
  showToast('Dieta del día guardada');
  renderDiet();
  renderWeeklyDietOverview();
}

// PROGRESS & HISTORY

function renderProgress() {
  let html = renderGoalCard();
  html += `<div style="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;">
    <button class="filter-btn active" id="pt-resumen" onclick="switchProgressView('resumen')">Resumen</button>
    <button class="filter-btn" id="pt-pesos" onclick="switchProgressView('pesos')">Pesos</button>
    <button class="filter-btn" id="pt-dieta" onclick="switchProgressView('dieta')">Dieta</button>
    <button class="filter-btn" id="pt-registros" onclick="switchProgressView('registros')">Registros</button>
  </div><div id="progressContent"></div>
  <button class="share-btn" onclick="shareProgress()">📤 Compartir mi progreso</button>`;
  document.getElementById('historyInner').innerHTML = html;
  switchProgressView('resumen');
}

function switchProgressView(view) {
  ['resumen','pesos','dieta','registros'].forEach(v => {
    const b = document.getElementById('pt-' + v);
    if (b) b.classList.toggle('active', v === view);
  });
  const c = document.getElementById('progressContent');
  if (!c) return;
  switch(view) {
    case 'resumen': c.innerHTML = buildSummaryView(); break;
    case 'pesos': c.innerHTML = buildWeightView(); break;
    case 'dieta': c.innerHTML = buildDietView(); break;
    case 'registros': c.innerHTML = buildHistoryEntries(); break;
  }
}

function renderGoalCard() {
  const today = new Date();
  const review = new Date(GOAL.fechaRevision + 'T12:00:00');
  const start = new Date(GOAL.fechaInicio + 'T12:00:00');
  const daysLeft = Math.max(0, Math.ceil((review - today) / 86400000));
  const totalDays = Math.ceil((review - start) / 86400000);
  const timePct = Math.min(100, Math.round(((totalDays - daysLeft) / totalDays) * 100));
  const allM = getAllMedidas();
  const weightHist = getWeightHistory();
  const latest = weightHist.length > 0 ? weightHist[weightHist.length - 1].weight : (allM.length > 0 ? parseFloat(allM[0].peso) || null : null);
  const startM = allM.length > 1 ? allM.slice().reverse().find(m => m.date >= GOAL.fechaInicio) || allM[allM.length - 1] : (allM[0] || null);
  const startPeso = startM ? parseFloat(startM.peso) || null : null;
  let wPct = 0;
  if (latest && startPeso && startPeso > GOAL.pesoObjetivo) {
    wPct = Math.min(100, Math.max(0, Math.round(((startPeso - latest) / (startPeso - GOAL.pesoObjetivo)) * 100)));
  }
  const onTrack = wPct >= timePct;
  return `<div class="goal-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
      <div><span class="goal-badge">Ronda ${GOAL.ronda}</span><span class="goal-fase">${GOAL.fase}</span></div>
      <span class="goal-countdown">${daysLeft}d restantes</span>
    </div>
    <div class="goal-weight-row">
      <span class="goal-current">${latest ? latest.toFixed(1) : '—'}</span>
      <div class="goal-track"><div class="goal-fill" style="width:${wPct}%"></div><div class="goal-marker" style="left:${timePct}%"></div></div>
      <span class="goal-target-val">${GOAL.pesoObjetivo}</span>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:4px;">
      <span>actual kg</span>
      <span style="color:${onTrack ? 'var(--green)' : 'var(--orange)'}">${onTrack ? '✓ On track' : '⚠ Ajustar ritmo'}</span>
      <span>objetivo kg</span>
    </div>
  </div>`;
}

function shareProgress() {
  const allM = getAllMedidas();
  const weightHist = getWeightHistory();
  const latestW = weightHist.length > 0 ? weightHist[weightHist.length - 1].weight : (allM.length > 0 ? parseFloat(allM[0].peso) || 0 : 0);
  const { mon, sun } = getWeekRange(new Date());
  let workoutsThisWeek = 0;
  Object.keys(localStorage).filter(k => k.startsWith('workout-')).forEach(k => {
    const d = getStorage(k);
    if (!d || !d.date) return;
    const dt = new Date(d.date + 'T12:00:00');
    if (dt >= mon && dt <= sun) workoutsThisWeek++;
  });
  const review = new Date(GOAL.fechaRevision + 'T12:00:00');
  const daysLeft = Math.max(0, Math.ceil((review - new Date()) / 86400000));

  const topPRs = [];
  PROGRAM.vias.forEach(via => {
    via.exercises.forEach((ex, ei) => {
      const pr = getAllTimePR(via.id, ei);
      if (pr > 0) topPRs.push({ name: ex.name, weight: pr });
    });
  });
  topPRs.sort((a, b) => b.weight - a.weight);

  let text = `💪 Mi progreso – Ronda ${GOAL.ronda} (${GOAL.fase})\n`;
  text += `⚖️ Peso: ${latestW ? latestW.toFixed(1) : '—'}kg → Obj: ${GOAL.pesoObjetivo}kg\n`;
  text += `🏋️ ${workoutsThisWeek} entrenos esta semana\n`;
  text += `📅 ${daysLeft} días para revisión\n`;
  if (topPRs.length > 0) {
    text += `\n★ Top PRs:\n`;
    topPRs.slice(0, 5).forEach(p => { text += `  ${p.name}: ${p.weight}kg\n`; });
  }

  if (navigator.share) {
    navigator.share({ title: 'Mi Progreso Fitness', text }).catch(() => {});
  } else if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => showToast('Copiado al portapapeles'));
  } else {
    showToast('Compartir no disponible');
  }
}

function buildSummaryView() {
  let html = '';
  const allM = getAllMedidas();
  const weightHist = getWeightHistory();
  const latestW = weightHist.length > 0 ? weightHist[weightHist.length - 1].weight : (allM.length > 0 ? parseFloat(allM[0].peso) || 0 : 0);
  const { mon, sun } = getWeekRange(new Date());
  let workoutsThisWeek = 0;
  Object.keys(localStorage).filter(k => k.startsWith('workout-')).forEach(k => {
    const d = getStorage(k);
    if (!d || !d.date) return;
    const dt = new Date(d.date + 'T12:00:00');
    if (dt >= mon && dt <= sun) workoutsThisWeek++;
  });
  const allIds = getAllDietCheckIds();
  let dietDays = 0, dietPctSum = 0;
  const cursor = new Date(mon);
  const today = new Date();
  while (cursor <= sun && cursor <= today) {
    const dk = cursor.toISOString().split('T')[0];
    const data = getStorage('diet-' + dk);
    if (data && data.savedAt) {
      dietDays++;
      const checked = allIds.filter(id => isDietDone(data, id)).length;
      dietPctSum += allIds.length > 0 ? checked / allIds.length : 0;
    }
    cursor.setDate(cursor.getDate() + 1);
  }
  const weekDietPct = dietDays > 0 ? Math.round((dietPctSum / dietDays) * 100) : 0;

  // Body fat estimation from latest medidas
  let bfPct = null, bfCategory = '';
  if (allM.length > 0) {
    const lat = allM[0];
    const waist = parseFloat(lat.cintura) || 0;
    const neck = parseFloat(lat.cuello) || 0;
    const height = 178; // user height in cm
    if (waist > 0 && neck > 0) {
      bfPct = calculateBodyFat(waist, neck, height);
      if (bfPct !== null) {
        if (bfPct < 10) bfCategory = 'Esencial';
        else if (bfPct < 14) bfCategory = 'Atlético';
        else if (bfPct < 18) bfCategory = 'Fitness';
        else if (bfPct < 25) bfCategory = 'Normal';
        else bfCategory = 'Sobrepeso';
      }
    }
  }

  html += `<div class="metrics-row">
    <div class="metric-card"><div class="metric-value" style="color:var(--text)">${latestW ? latestW.toFixed(1) : '—'}</div><div class="metric-label">Peso (kg)</div></div>
    <div class="metric-card"><div class="metric-value" style="color:var(--accent2)">${workoutsThisWeek}/4</div><div class="metric-label">Entrenos sem.</div></div>
    <div class="metric-card"><div class="metric-value" style="color:var(--orange)">${weekDietPct}%</div><div class="metric-label">Dieta sem.</div></div>
    ${bfPct !== null ? `<div class="metric-card"><div class="metric-value" style="color:var(--green2)">${bfPct}%</div><div class="metric-label">Grasa corp.</div></div>` : ''}
  </div>`;

  // Daily weight chart
  if (weightHist.length > 1) {
    html += `<div class="section-title">⚖️ Peso diario</div>`;
    const recent = weightHist.slice(-30);
    const vals = recent.map(w => w.weight);
    const maxP = Math.max(...vals);
    const minP = Math.min(...vals);
    const range = maxP - minP || 1;
    html += `<div style="background:var(--bg2);border-radius:var(--radius-sm);padding:10px;margin-bottom:14px;border:1px solid rgba(255,255,255,0.04);">
      <div style="display:flex;align-items:flex-end;gap:2px;height:60px;">`;
    recent.forEach((w, i) => {
      const pct = ((w.weight - minP + 0.5) / (range + 1)) * 100;
      const isLast = i === recent.length - 1;
      html += `<div style="flex:1;height:${pct}%;min-height:4px;border-radius:3px 3px 0 0;background:${isLast ? 'var(--green)' : 'var(--accent)'};opacity:${isLast ? 1 : 0.5};" title="${w.date}: ${w.weight}kg"></div>`;
    });
    const avg7 = vals.slice(-7).reduce((a, b) => a + b, 0) / Math.min(7, vals.length);
    html += `</div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:4px;">
        <span>${vals[0].toFixed(1)}kg</span><span>x̄7d: ${avg7.toFixed(1)}kg</span><span>${vals[vals.length - 1].toFixed(1)}kg</span>
      </div></div>`;
  } else if (allM.length > 1) {
    html += `<div class="section-title">📉 Evolución de peso</div>`;
    const pesoData = allM.slice(0, 12).reverse().filter(m => m.peso);
    const vals = pesoData.map(m => parseFloat(m.peso));
    const maxP = Math.max(...vals);
    const minP = Math.min(...vals);
    const range = maxP - minP || 1;
    html += `<div style="background:var(--bg2);border-radius:var(--radius-sm);padding:10px;margin-bottom:14px;border:1px solid rgba(255,255,255,0.04);">
      <div style="display:flex;align-items:flex-end;gap:4px;height:60px;">`;
    pesoData.forEach((m, i) => {
      const val = parseFloat(m.peso);
      const pct = ((val - minP + 0.5) / (range + 1)) * 100;
      const isLast = i === pesoData.length - 1;
      const d = new Date(m.date + 'T12:00:00');
      html += `<div style="flex:1;height:${pct}%;min-height:4px;border-radius:3px 3px 0 0;background:${isLast ? 'var(--green)' : 'var(--accent)'};opacity:${isLast ? 1 : 0.5};" title="${formatDate(d)}: ${val}kg"></div>`;
    });
    html += `</div>
      <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:4px;">
        <span>${vals[0]}kg</span><span>${vals[vals.length - 1]}kg</span>
      </div></div>`;
  }

  // Body fat card
  if (bfPct !== null) {
    html += `<div class="bf-card">
      <div class="bf-value" style="color:var(--green2)">${bfPct}%</div>
      <div class="bf-label">Grasa corporal estimada (U.S. Navy)</div>
      <div class="bf-category" style="color:var(--accent2)">${bfCategory}</div>
    </div>`;
  }

  // Weekly summary
  html += buildWeeklySummary();

  if (allM.length >= 2) {
    const lat = allM[0];
    const fst = allM[allM.length - 1];
    html += `<div class="section-title">📐 Cambios corporales (inicio → actual)</div>
      <table class="body-changes"><thead><tr><th>Medida</th><th>Inicio</th><th>Actual</th><th>Δ</th></tr></thead><tbody>`;
    MEDIDAS_FIELDS.forEach(f => {
      const v1 = parseFloat(fst[f.id]) || 0;
      const v2 = parseFloat(lat[f.id]) || 0;
      if (!v1 && !v2) return;
      const diff = v2 - v1;
      const cls = diff > 0 ? 'color:var(--orange)' : diff < 0 ? 'color:var(--green)' : 'color:var(--text3)';
      html += `<tr><td>${f.icon} ${f.label}</td><td>${v1 || '—'}</td><td>${v2 || '—'}</td><td style="${cls};font-weight:700">${v1 && v2 ? (diff > 0 ? '+' : '') + diff.toFixed(1) : '—'}</td></tr>`;
    });
    html += `</tbody></table>`;
  }
  return html;
}

function buildWeeklySummary() {
  const { mon, sun } = getWeekRange(new Date());
  const weekWorkouts = [];
  let totalSets = 0, totalVolume = 0;
  Object.keys(localStorage).filter(k => k.startsWith('workout-')).forEach(k => {
    const d = getStorage(k);
    if (!d || !d.date) return;
    const dt = new Date(d.date + 'T12:00:00');
    if (dt >= mon && dt <= sun) {
      weekWorkouts.push(d);
      d.exercises.forEach(ex => {
        ex.sets.forEach(s => {
          if (s.done) {
            totalSets++;
            totalVolume += (parseFloat(s.weight) || 0) * (parseInt(s.reps) || 0);
          }
        });
      });
    }
  });
  if (weekWorkouts.length === 0) return '';

  const cardioCount = weekWorkouts.filter(w => w.cardio).length;
  const prsThisWeek = [];
  weekWorkouts.forEach(w => {
    const via = PROGRAM.vias.find(v => v.id === w.viaId);
    if (!via) return;
    w.exercises.forEach((ex, ei) => {
      const maxW = Math.max(...ex.sets.map(s => parseFloat(s.weight) || 0));
      const hist = getExerciseAllHistory(via.id, ei);
      const allTimePR = hist.length > 0 ? Math.max(...hist.map(h => h.weight)) : 0;
      if (maxW > 0 && maxW >= allTimePR) prsThisWeek.push({ name: ex.name, weight: maxW });
    });
  });

  let html = `<div class="weekly-summary-card">
    <div class="weekly-summary-title">📊 Resumen semanal</div>
    <div class="ws-row"><span class="ws-label">Sesiones</span><span class="ws-val">${weekWorkouts.length}</span></div>
    <div class="ws-row"><span class="ws-label">Series completadas</span><span class="ws-val">${totalSets}</span></div>
    <div class="ws-row"><span class="ws-label">Volumen total</span><span class="ws-val">${(totalVolume / 1000).toFixed(1)}t</span></div>
    <div class="ws-row"><span class="ws-label">Cardio</span><span class="ws-val">${cardioCount}/${weekWorkouts.length}</span></div>`;
  if (prsThisWeek.length > 0) {
    html += `<div class="ws-row"><span class="ws-label">★ PRs esta semana</span><span class="ws-val" style="color:var(--green2)">${prsThisWeek.length}</span></div>`;
  }
  html += `</div>`;
  return html;
}

function getExerciseHistory(name) {
  return Object.keys(localStorage)
    .filter(k => k.startsWith('workout-'))
    .sort()
    .reduce((acc, k) => {
      const d = getStorage(k);
      if (!d) return acc;
      d.exercises.forEach(ex => {
        if (ex.name === name) {
          const maxW = Math.max(...ex.sets.map(s => parseFloat(s.weight) || 0));
          if (maxW > 0) acc.push({ date: d.date, weight: maxW });
        }
      });
      return acc;
    }, []);
}

function buildWeightView() {
  let html = '';
  PROGRAM.vias.forEach(via => {
    html += `<div class="progress-via-header">${via.name} · ${via.subtitle}</div>`;
    via.exercises.forEach((ex, ei) => {
      const hist = getExerciseHistory(ex.name);
      const suggestion = getWeightSuggestion(ex, via.id, ei);
      html += `<div class="progress-ex">`;
      if (hist.length === 0) {
        html += `<div class="progress-ex-head"><span class="progress-ex-name">${ex.name}</span><span class="progress-no-data">Sin datos</span></div>`;
      } else {
        const last = hist[hist.length - 1];
        const first = hist[0];
        const trend = last.weight - first.weight;
        const max = Math.max(...hist.map(h => h.weight));
        const e1rm = ex.reps <= 12 ? calculate1RM(last.weight, ex.reps) : 0;

        let statusIcon = '';
        if (suggestion) {
          const icons = { up: '↑', hold: '=', down: '↓', stall: '⚠', pr: '★' };
          statusIcon = `<span class="suggestion-badge ${suggestion.status}" style="font-size:10px;margin-left:4px;">${icons[suggestion.status]}</span>`;
        }

        html += `<div class="progress-ex-head">
          <span class="progress-ex-name">${ex.name}${statusIcon}${e1rm > 0 ? `<span class="e1rm-badge">1RM≈${e1rm}kg</span>` : ''}</span>
          <span class="progress-ex-val">${last.weight}kg</span>
          ${hist.length > 1 && trend !== 0 ? `<span class="progress-trend ${trend > 0 ? 'up' : 'down'}">${trend > 0 ? '+' : ''}${trend.toFixed(1)}</span>` : ''}
        </div>
        <div class="sparkline">`;
        hist.slice(-8).forEach((h, i, arr) => {
          const pct = max > 0 ? Math.max(10, (h.weight / max) * 100) : 10;
          const isLast = i === arr.length - 1;
          html += `<div class="spark-bar" style="height:${pct}%;${isLast ? 'background:var(--green);opacity:1' : ''}" title="${h.date}: ${h.weight}kg"></div>`;
        });
        html += `</div>`;
      }
      html += `</div>`;
    });
  });
  return html;
}

function buildDietView() {
  const allIds = getAllDietCheckIds();
  const start = new Date(GOAL.fechaInicio + 'T00:00:00');
  const today = new Date();
  let totalTracked = 0, totalPctSum = 0, totalDays = 0;
  const weeks = [];
  let ws = new Date(start);
  while (ws <= today) {
    let we = new Date(ws); we.setDate(we.getDate() + 6);
    if (we > today) we = new Date(today);
    let tracked = 0, pctSum = 0, days = 0;
    const d = new Date(ws);
    while (d <= we) {
      days++; totalDays++;
      const dk = d.toISOString().split('T')[0];
      const data = getStorage('diet-' + dk);
      if (data && data.savedAt) {
        tracked++; totalTracked++;
        const checked = allIds.filter(id => isDietDone(data, id)).length;
        const pct = allIds.length > 0 ? checked / allIds.length : 0;
        pctSum += pct; totalPctSum += pct;
      }
      d.setDate(d.getDate() + 1);
    }
    const avg = tracked > 0 ? Math.round((pctSum / tracked) * 100) : 0;
    weeks.push({ label: `Sem ${weeks.length + 1}`, avg, tracked, days });
    ws.setDate(ws.getDate() + 7);
  }
  const overallPct = totalTracked > 0 ? Math.round((totalPctSum / totalTracked) * 100) : 0;
  const trackingRate = totalDays > 0 ? Math.round((totalTracked / totalDays) * 100) : 0;

  let html = `<div class="metrics-row">
    <div class="metric-card"><div class="metric-value" style="color:var(--orange)">${overallPct}%</div><div class="metric-label">Cumplimiento</div></div>
    <div class="metric-card"><div class="metric-value" style="color:var(--accent2)">${totalTracked}/${totalDays}</div><div class="metric-label">Días registr.</div></div>
    <div class="metric-card"><div class="metric-value" style="color:var(--green2)">${trackingRate}%</div><div class="metric-label">Seguimiento</div></div>
  </div>`;
  html += `<div class="section-title">📊 Cumplimiento semanal</div><div class="compliance-weeks">`;
  weeks.forEach(w => {
    const color = w.avg >= 80 ? 'var(--green)' : w.avg >= 50 ? 'var(--orange)' : 'var(--red)';
    html += `<div class="compliance-week">
      <span class="compliance-week-label">${w.label}</span>
      <div class="compliance-week-bar"><div class="compliance-week-fill" style="width:${w.avg}%;background:${color}"></div></div>
      <span class="compliance-week-val" style="color:${color}">${w.avg}%</span>
    </div>`;
  });
  html += `</div>`;
  if (weeks.length === 0) html += `<div class="empty-state"><p>Empieza a registrar tu dieta para ver el progreso</p></div>`;
  return html;
}

function buildHistoryEntries() {
  const entries = [];
  Object.keys(localStorage).filter(k => k.startsWith('workout-')).forEach(key => {
    const data = getStorage(key);
    if (data) entries.push({ type: 'workout', key, date: data.date, data });
  });
  Object.keys(localStorage).filter(k => k.startsWith('diet-')).forEach(key => {
    const data = getStorage(key);
    if (data && data.savedAt) entries.push({ type: 'diet', key, date: key.replace('diet-', ''), data });
  });
  Object.keys(localStorage).filter(k => k.startsWith('medidas-')).forEach(key => {
    const data = getStorage(key);
    if (data && data.peso) entries.push({ type: 'medidas', key, date: key.replace('medidas-', ''), data });
  });
  entries.sort((a, b) => b.date.localeCompare(a.date));

  let html = `<div class="history-filters">
    <button class="filter-btn active" onclick="filterHistory('all', this)">Todo</button>
    <button class="filter-btn" onclick="filterHistory('workout', this)">Entreno</button>
    <button class="filter-btn" onclick="filterHistory('diet', this)">Dieta</button>
    <button class="filter-btn" onclick="filterHistory('medidas', this)">Medidas</button>
  </div>`;

  if (entries.length === 0) {
    html += `<div class="empty-state"><div class="icon">&#128203;</div><p>Aún no hay registros.<br>¡Empieza hoy!</p></div>`;
  } else {
    html += '<div id="historyList">';
    entries.forEach(entry => {
      const d = new Date(entry.date + 'T12:00:00');
      if (entry.type === 'workout') {
        const data = entry.data;
        const completedSets = data.exercises.reduce((sum, ex) => sum + ex.sets.filter(s => s.done).length, 0);
        const totalSets = data.exercises.reduce((sum, ex) => sum + ex.sets.length, 0);
        const totalVolume = data.exercises.reduce((sum, ex) =>
          sum + ex.sets.reduce((ss, s) => ss + (parseFloat(s.weight) || 0) * (parseInt(s.reps) || 0), 0), 0);
        html += `<div class="history-entry" data-type="workout" onclick="toggleHistoryDetail(this)">
          <div class="history-date">${formatDate(d)}</div>
          <div class="history-via">&#9947; ${data.viaName} ${completedSets === totalSets ? '<span class="workout-done-badge">Completo</span>' : ''}${data.cardio ? ' <span class="workout-done-badge" style="background:rgba(0,184,148,0.15)">Cardio ✓</span>' : ''}</div>
          <div class="history-summary">${completedSets}/${totalSets} series · ${Math.round(totalVolume)} kg vol. total</div>
          <div class="history-detail">`;
        data.exercises.forEach(ex => {
          const setsStr = ex.sets.filter(s => s.weight || s.reps).map(s => `${s.weight || '?'}kg×${s.reps || '?'}`).join(' | ');
          const fbLabel = ex.feedback ? (ex.feedback === 'subir' ? ' ↑' : ex.feedback === 'bajar' ? ' ↓' : ' =') : '';
          if (setsStr) {
            html += `<div class="history-exercise"><div class="history-exercise-name">${ex.name}${fbLabel}</div><div class="history-sets">${setsStr}${ex.comment ? ' · ' + ex.comment : ''}</div></div>`;
          }
        });
        html += `<button class="delete-entry-btn" onclick="confirmDelete('${entry.key}', 'workout', event)">Eliminar</button></div></div>`;
      } else if (entry.type === 'diet') {
        const data = entry.data;
        const allIds = getAllDietCheckIds();
        const checkedCount = allIds.filter(id => isDietDone(data, id)).length;
        const pct = allIds.length > 0 ? Math.round((checkedCount / allIds.length) * 100) : 0;
        html += `<div class="history-entry" data-type="diet" onclick="toggleHistoryDetail(this)">
          <div class="history-date">${formatDate(d)}</div>
          <div class="history-via">&#9749; Dieta <span class="workout-done-badge" style="background:rgba(243,156,18,0.15); color:var(--orange);">${pct}%</span></div>
          <div class="history-summary">${checkedCount}/${allIds.length} items completados${data.extras ? ' · Extras: ' + data.extras : ''}</div>
          <div class="history-detail">`;
        MEALS.forEach(meal => {
          meal.items.forEach(item => {
            const done = isDietDone(data, item.id);
            const val = data[item.id];
            let detail = item.label;
            if (item.choices && val && typeof val === 'object' && val.choice !== undefined) {
              const c = item.choices[val.choice];
              detail += `: ${c.name} ${val.qty || c.qty}${c.unit}`;
            }
            html += `<div class="history-exercise"><div class="history-exercise-name">${done ? '✓' : '✗'} ${detail}</div></div>`;
          });
        });
        if (data.extras) html += `<div class="history-exercise"><div class="history-exercise-name" style="color:var(--orange);">🍕 ${data.extras}</div></div>`;
        html += `<button class="delete-entry-btn" onclick="confirmDelete('${entry.key}', 'diet', event)">Eliminar</button></div></div>`;
      } else if (entry.type === 'medidas') {
        const data = entry.data;
        const hasPhotos = data.photos && data.photos.length > 0;
        html += `<div class="history-entry" data-type="medidas" onclick="toggleHistoryDetail(this)">
          <div class="history-date">${formatDate(d)}</div>
          <div class="history-via">&#9881; Medidas${hasPhotos ? ' 📷' : ''}</div>
          <div class="history-summary">Peso: ${data.peso || '—'}kg${data.pecho ? ' · Pecho: ' + data.pecho : ''}${data.cintura ? ' · Cintura: ' + data.cintura : ''}</div>
          <div class="history-detail">`;
        MEDIDAS_FIELDS.forEach(f => {
          if (data[f.id]) html += `<div class="history-exercise"><div class="history-exercise-name">${f.icon} ${f.label}: ${data[f.id]} ${f.unit}</div></div>`;
        });
        if (hasPhotos) {
          html += '<div class="photos-grid" style="margin-top:8px;">';
          data.photos.forEach(p => { html += `<img class="photo-thumb" src="${p}" onclick="event.stopPropagation(); openHistoryPhoto(this.src)">`; });
          html += '</div>';
        }
        if (data.notes) html += `<div class="history-exercise"><div class="history-exercise-name">📝 ${data.notes}</div></div>`;
        html += `<button class="delete-entry-btn" onclick="confirmDelete('${entry.key}', 'medidas', event)">Eliminar</button></div></div>`;
      }
    });
    html += '</div>';
  }
  return html;
}

function getAllDietCheckIds() {
  const ids = [];
  MEALS.forEach(meal => {
    meal.items.forEach(i => ids.push(i.id));
  });
  return ids;
}

function toggleHistoryDetail(el) {
  const detail = el.querySelector('.history-detail');
  if (detail) detail.classList.toggle('open');
}

function openHistoryPhoto(src) {
  const lb = document.getElementById('photoLightbox');
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightboxDeleteBtn').style.display = 'none';
  lb.classList.add('active');
}

function confirmDelete(key, type, event) {
  event.stopPropagation();
  if (confirm('¿Eliminar este registro?')) {
    localStorage.removeItem(key);
    if (type === 'workout') {
      const cardioKey = key.replace('workout-', 'cardio-');
      localStorage.removeItem(cardioKey);
      renderSessionSelector();
    }
    showToast('Registro eliminado');
    renderHistory();
  }
}

function filterHistory(type, btn) {
  btn.parentElement.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.history-entry').forEach(entry => {
    if (type === 'all' || entry.dataset.type === type) {
      entry.style.display = '';
    } else {
      entry.style.display = 'none';
    }
  });
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function render() {
  renderWorkoutDateDisplay();
  renderSessionSelector();
  renderExercises();
  renderDiet();
  renderWeeklyDietOverview();
}

// MEDIDAS
const MEDIDAS_FIELDS = [
  { id: 'peso', label: 'Peso', unit: 'kg', icon: '⚖️' },
  { id: 'pecho', label: 'Pecho', unit: 'cm', icon: '📐' },
  { id: 'cintura', label: 'Cintura', unit: 'cm', icon: '📐' },
  { id: 'cadera', label: 'Cadera', unit: 'cm', icon: '📐' },
  { id: 'brazo_d', label: 'Bíceps dcho.', unit: 'cm', icon: '💪' },
  { id: 'brazo_i', label: 'Bíceps izq.', unit: 'cm', icon: '💪' },
  { id: 'muslo_d', label: 'Muslo dcho.', unit: 'cm', icon: '🦵' },
  { id: 'muslo_i', label: 'Muslo izq.', unit: 'cm', icon: '🦵' },
  { id: 'gemelo', label: 'Gemelo', unit: 'cm', icon: '🦵' },
  { id: 'cuello', label: 'Cuello', unit: 'cm', icon: '📐' },
  { id: 'hombros', label: 'Hombros', unit: 'cm', icon: '📐' },
];

let medidasDate = new Date();

function getCurrentFriday() {
  const d = new Date(medidasDate);
  const day = d.getDay();
  const diff = (day <= 5) ? (5 - day) : (5 - day + 7);
  d.setDate(d.getDate() + diff);
  return d;
}

function changeMedidasWeek(delta) {
  medidasDate.setDate(medidasDate.getDate() + (delta * 7));
  renderMedidas();
}

function fridayKey(d) {
  return 'medidas-' + d.toISOString().split('T')[0];
}

function getAllMedidas() {
  return Object.keys(localStorage)
    .filter(k => k.startsWith('medidas-'))
    .sort()
    .reverse()
    .map(k => ({ key: k, date: k.replace('medidas-', ''), ...getStorage(k) }));
}

function getPreviousMedidas(currentKey) {
  const all = getAllMedidas();
  const idx = all.findIndex(m => m.key === currentKey);
  if (idx >= 0 && idx < all.length - 1) return all[idx + 1];
  if (idx < 0 && all.length > 0) return all[0];
  return null;
}

function renderMedidas() {
  const friday = getCurrentFriday();
  const key = fridayKey(friday);
  const saved = getStorage(key) || {};
  const prev = getPreviousMedidas(key);
  const isFridayToday = new Date().getDay() === 5;

  let html = '';

  html += `<div class="date-nav" style="justify-content:center; margin-bottom:12px;">
    <button onclick="changeMedidasWeek(-1)">&#8249;</button>
    <span style="min-width:140px; text-align:center;">Semana del ${formatDate(friday)}</span>
    <button onclick="changeMedidasWeek(1)">&#8250;</button>
  </div>`;

  html += `<div class="medidas-form"><h3>📏 Medidas de la semana</h3>`;

  MEDIDAS_FIELDS.forEach(f => {
    const val = saved[f.id] || '';
    let diffHtml = '';
    if (prev && prev[f.id] && val) {
      const diff = (parseFloat(val) - parseFloat(prev[f.id])).toFixed(1);
      const cls = diff > 0 ? 'up' : diff < 0 ? 'down' : 'neutral';
      const sign = diff > 0 ? '+' : '';
      diffHtml = `<span class="medida-diff ${cls}">${sign}${diff}</span>`;
    }
    html += `<div class="medida-row">
      <span class="medida-label">${f.icon} ${f.label}</span>
      <input class="medida-input" type="number" inputmode="decimal" step="0.1"
        placeholder="—" value="${val}" data-medida="${f.id}"
        onchange="onMedidaChange()">
      <span class="medida-unit">${f.unit}</span>
      ${diffHtml}
    </div>`;
  });

  // Photos
  const photos = saved.photos || [];
  html += `<div style="margin-top:12px;">
    <div style="font-size:13px; font-weight:600; color:var(--text2); margin-bottom:8px;">📸 Fotos de la semana</div>`;

  if (photos.length > 0) {
    html += '<div class="photos-grid">';
    photos.forEach((p, i) => {
      html += `<img class="photo-thumb" src="${p}" onclick="openPhoto(${i})" alt="Foto ${i+1}">`;
    });
    html += '</div>';
  }

  html += `<div class="photo-upload-area" onclick="document.getElementById('photoInput').click()">
      <div class="icon">📷</div>
      <p>Toca para añadir foto</p>
    </div>
    <input type="file" id="photoInput" accept="image/*" style="display:none" onchange="addMedidaPhoto(event)">
  </div>`;

  html += `<textarea class="exercise-comment" rows="2" placeholder="Notas: sensaciones, etc."
    id="medidasNotes" onchange="onMedidaChange()">${saved.notes || ''}</textarea>
  <button class="medidas-save-btn" onclick="saveMedidas()">Guardar medidas</button>
  </div>`;

  // Historial de medidas
  const allMedidas = getAllMedidas();
  if (allMedidas.length > 0) {
    html += `<div class="medidas-history">
      <div class="medidas-history-title">Historial de medidas</div>
      <div style="overflow-x:auto; -webkit-overflow-scrolling:touch;">
      <table class="medidas-table">
        <thead><tr>
          <th>Fecha</th>
          <th>Peso</th>
          <th>Pecho</th>
          <th>Cint.</th>
          <th>Cad.</th>
          <th>Bíc.D</th>
          <th>Bíc.I</th>
          <th>Mus.D</th>
          <th>Mus.I</th>
          <th>Gem.</th>
          <th>Homb.</th>
        </tr></thead><tbody>`;

    allMedidas.forEach(m => {
      const d = new Date(m.date + 'T12:00:00');
      const hasPhotos = m.photos && m.photos.length > 0;
      html += `<tr>
        <td class="date-col">${formatDate(d)}${hasPhotos ? ' 📷' : ''}</td>`;
      MEDIDAS_FIELDS.forEach(f => {
        html += `<td>${m[f.id] || '—'}</td>`;
      });
      html += `</tr>`;
    });

    html += `</tbody></table></div></div>`;
  }

  document.getElementById('medidasContent').innerHTML = html;
}

function onMedidaChange() {
  const friday = getCurrentFriday();
  const key = fridayKey(friday);
  const data = getStorage(key) || {};
  document.querySelectorAll('[data-medida]').forEach(input => {
    const field = input.dataset.medida;
    if (input.value) data[field] = input.value;
    else delete data[field];
  });
  const notes = document.getElementById('medidasNotes');
  if (notes) data.notes = notes.value;
  setStorage(key, data);
}

function saveMedidas() {
  onMedidaChange();
  showToast('Medidas guardadas');
}

function addMedidaPhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const maxSize = 600;
      let w = img.width, h = img.height;
      if (w > h) { if (w > maxSize) { h = h * maxSize / w; w = maxSize; } }
      else { if (h > maxSize) { w = w * maxSize / h; h = maxSize; } }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.7);

      const friday = getCurrentFriday();
      const key = fridayKey(friday);
      const saved = getStorage(key) || {};
      if (!saved.photos) saved.photos = [];
      saved.photos.push(dataUrl);
      try {
        setStorage(key, saved);
        showToast('Foto añadida');
        renderMedidas();
      } catch (e) {
        showToast('Sin espacio. Exporta backup primero.');
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
  event.target.value = '';
}

function openPhoto(idx) {
  const friday = getCurrentFriday();
  const key = fridayKey(friday);
  const saved = getStorage(key) || {};
  const photos = saved.photos || [];
  if (!photos[idx]) return;
  const lb = document.getElementById('photoLightbox');
  document.getElementById('lightboxImg').src = photos[idx];
  const delBtn = document.getElementById('lightboxDeleteBtn');
  delBtn.style.display = '';
  delBtn.onclick = function() {
    if (confirm('¿Eliminar esta foto?')) {
      photos.splice(idx, 1);
      saved.photos = photos;
      setStorage(key, saved);
      closeLightbox();
      renderMedidas();
    }
  };
  lb.classList.add('active');
}

function closeLightbox() {
  document.getElementById('photoLightbox').classList.remove('active');
}

// Keyboard handling for mobile: auto-advance to next input
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const el = document.activeElement;
    if (el && el.classList.contains('set-input')) {
      e.preventDefault();
      const inputs = Array.from(document.querySelectorAll('.set-input'));
      const idx = inputs.indexOf(el);
      if (idx < inputs.length - 1) {
        inputs[idx + 1].focus();
        inputs[idx + 1].select();
      } else {
        el.blur();
      }
    }
  }
});

// Prevent pull-to-refresh on mobile when scrolling timer
document.getElementById('timerOverlay').addEventListener('touchmove', e => e.preventDefault(), { passive: false });

// Init
render();

// Backup reminder: check on every load
(function backupReminder() {
  const lastBackup = localStorage.getItem('lastBackupDate');
  const now = new Date();
  const daysSince = lastBackup ? Math.floor((now - new Date(lastBackup)) / 86400000) : 999;
  const workoutCount = Object.keys(localStorage).filter(k => k.startsWith('workout-')).length;
  if (workoutCount > 0 && daysSince >= 7) {
    setTimeout(() => {
      if (confirm('Llevas ' + (lastBackup ? daysSince + ' días' : 'tiempo') + ' sin hacer backup.\n\n¿Exportar copia de seguridad ahora?')) {
        exportData();
      }
    }, 1500);
  }
})();

// BACKUP: Export / Import
function exportData() {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('workout-') || key.startsWith('diet-') || key.startsWith('medidas-') || key.startsWith('cardio-')) {
      data[key] = getStorage(key);
    }
  }
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `marc-tracker-backup-${dateKey()}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  localStorage.setItem('lastBackupDate', new Date().toISOString());
  showToast('Backup descargado');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      const keys = Object.keys(data);
      if (keys.length === 0) { showToast('Fichero vacío'); return; }
      let count = 0;
      keys.forEach(key => {
        if (key.startsWith('workout-') || key.startsWith('diet-') || key.startsWith('medidas-') || key.startsWith('cardio-')) {
          setStorage(key, data[key]);
          count++;
        }
      });
      showToast(`${count} registros importados`);
      render();
      if (document.querySelector('.tab[data-tab="history"]').classList.contains('active')) renderProgress();
    } catch (err) {
      showToast('Error al importar');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// PWA: register proper Service Worker file for reliable offline support
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(reg => {
    reg.update();
  }).catch(() => {});
}
